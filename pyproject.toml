[tool.black]
line-length = 88
target-version = ["py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.venv
  | \.git
  | __pycache__
  | \.pytest_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["app", "evaluation", "tests"]
skip = [".venv", ".git", "__pycache__", ".pytest_cache"]
